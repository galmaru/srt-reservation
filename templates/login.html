{% extends "base.html" %}
{% block content %}
<div style="max-width: 420px; margin: 60px auto;">
  <div class="card">
    <div style="text-align:center; margin-bottom: 28px;">
      <div style="font-size: 2.5rem; margin-bottom: 8px;">🚄</div>
      <h1 style="font-size: 1.5rem; font-weight: 800; color: #1a202c;">SRT 자동 예매</h1>
      <p style="color: #718096; margin-top: 6px; font-size: 0.95rem;">SRT 계정으로 로그인하세요</p>
    </div>

    {% if error %}
    <div class="alert alert-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" name="srt_id" placeholder="전화번호 / 이메일 / 멤버십번호" required autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="srt_pw" placeholder="SRT 비밀번호" required>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top: 16px;">
        로그인
      </button>
    </form>

    <p style="text-align:center; margin-top: 20px; font-size: 0.85rem; color: #a0aec0;">
      로그인 정보는 세션에만 저장되며 서버에 기록되지 않습니다
    </p>
  </div>
</div>
{% endblock %}
