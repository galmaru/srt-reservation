<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚄 SRT 자동 예매</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      color: #1a202c;
    }

    /* 헤더 */
    header {
      background: linear-gradient(135deg, #1a56db, #0e3a8a);
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    header nav { display: flex; gap: 8px; }
    header nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    header nav a:hover { background: rgba(255,255,255,0.15); color: white; }

    /* 메인 컨텐츠 */
    main {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* 카드 */
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.06);
      padding: 32px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e2e8f0;
    }

    /* 폼 */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a202c;
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
      background: white;
    }

    /* 버튼 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1a56db, #1e40af);
      color: white;
      width: 100%;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,86,219,0.3); }
    .btn-success { background: #16a34a; color: white; }
    .btn-success:hover { background: #15803d; }
    .btn-danger { background: #dc2626; color: white; padding: 6px 14px; font-size: 0.85rem; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #1a56db;
      color: #1a56db;
      padding: 8px 18px;
      font-size: 0.9rem;
    }
    .btn-outline:hover { background: #eff6ff; }

    /* 알림 */
    .alert {
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }

    /* 2열 그리드 */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

    /* 태그 */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-green { background: #dcfce7; color: #16a34a; }
    .badge-red { background: #fee2e2; color: #dc2626; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-yellow { background: #fef9c3; color: #a16207; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🚄 SRT 자동 예매</div>
    <nav>
      {% if session.get('sid') %}
        <a href="{{ url_for('search') }}">열차 검색</a>
        <a href="{{ url_for('reservations') }}">예매 내역</a>
        <a href="{{ url_for('logout') }}">로그아웃</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
